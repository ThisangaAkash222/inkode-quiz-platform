<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Quiz Platform</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
      <h2 class="logo">Quiz Admin</h2>
      <nav>
        <ul>
          <li><a href="#">Dashboard</a></li>
          <li><a href="#">Create Quiz</a></li>
          <li><a href="#">Manage Quizzes</a></li>
          <li><a href="#">Students</a></li>
          <li><a href="#">Settings</a></li>
        </ul>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <section class="card">
        <h2>Create New Quiz</h2>
        <form id="quizForm">
          <label>
            Title
            <input type="text" id="quizTitle" required>
          </label>
          <label>
            Module
            <input type="text" id="quizModule" required>
          </label>
          <label>
            Exam Type
            <input type="text" id="quizType" required>
          </label>
          <label>
            Duration (minutes)
            <input type="number" id="quizDuration" min="1" required>
          </label>
          <label>
            Total Marks
            <input type="number" id="quizMarks" min="1" required>
          </label>
          <button type="submit" class="btn primary">Save Quiz</button>
        </form>
      </section>

      <section class="card">
        <h2>Add Questions</h2>
        <div class="question-controls">
          <button id="addSingle" class="btn">Add Single-answer MCQ</button>
          <button id="addMultiple" class="btn">Add Multiple-answer MCQ</button>
        </div>
        <div id="questionsContainer"></div>
      </section>
    </main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
